<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Brain Bot V15 — World HQ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#070714;overflow:hidden;font-family:'Courier New',monospace;color:#c0c8ff;}
#app{position:relative;width:100vw;height:100vh;overflow:hidden;}
#game-container{position:absolute;inset:0;z-index:0;}
#ui-layer{position:absolute;inset:0;z-index:10;pointer-events:none;}

/* Panels */
.panel{background:#0a0a1ecc;border:1px solid #1a1a3e;border-top:2px solid var(--accent,#00ff88);
  padding:7px 10px;margin-bottom:5px;border-radius:2px;pointer-events:all;
  box-shadow:0 0 8px #00ff8810;}
.panel-hdr{color:var(--accent,#00ff88);font-size:8px;font-weight:bold;letter-spacing:1px;
  margin-bottom:5px;cursor:pointer;display:flex;justify-content:space-between;}
.panel-hdr span{color:#444;font-size:10px;}

/* Right sidebar */
#sidebar{position:absolute;top:8px;right:8px;width:200px;max-height:calc(100vh-80px);
  overflow-y:auto;overflow-x:hidden;}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:#1a1a3e;}

/* Minimap */
#mm-wrap{position:absolute;top:8px;left:8px;}
#mm-title{background:#0a0a1ecc;border:1px solid #1a1a3e;border-bottom:none;
  padding:3px 8px;display:flex;justify-content:space-between;align-items:center;}
#mm-title span{font-size:7px;}
#mm-title span:first-child{color:var(--accent,#00ff88);font-weight:bold;letter-spacing:1px;}
#mm-title span:last-child{color:#333;}
#minimap{display:block;border:1px solid #1a1a3e;cursor:crosshair;}

/* Bottom toolbar */
#toolbar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;align-items:center;background:#0a0a1ecc;
  border:1px solid #1a1a3e;border-radius:2px;padding:5px 12px;
  pointer-events:all;white-space:nowrap;}
.tbtn{background:none;border:1px solid #1a1a3e;color:#444;padding:3px 8px;
  font-size:8px;cursor:pointer;border-radius:2px;font-family:monospace;transition:all .15s;}
.tbtn:hover{color:#888;border-color:#333;}
.tbtn.on{border-color:var(--accent,#00ff88);color:var(--accent,#00ff88);background:#00ff8812;}
.sep{width:1px;height:14px;background:#1a1a3e;}

/* Room label */
#room-lbl{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);
  background:#000c;color:var(--accent,#00ff88);padding:4px 16px;font-size:9px;
  border-radius:2px;border:1px solid;border-color:var(--accent,#00ff88);
  opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap;}

/* Modal */
#backdrop{display:none;position:absolute;inset:0;background:#00000099;z-index:40;pointer-events:all;cursor:pointer;}
#modal{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#0a0a1e;border:2px solid var(--accent,#00ff88);border-radius:4px;
  width:460px;max-width:92vw;max-height:80vh;z-index:50;pointer-events:all;overflow:hidden;
  box-shadow:0 0 40px #00ff8830;}
#modal-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;border-bottom:1px solid #1a1a3e;}
#modal-title{color:var(--accent,#00ff88);font-size:12px;font-weight:bold;letter-spacing:1px;}
#modal-close{background:none;border:1px solid #1a1a3e;color:#666;cursor:pointer;
  border-radius:2px;padding:2px 8px;font-size:10px;font-family:monospace;}
#modal-close:hover{color:#aaa;border-color:#333;}
#modal-body{padding:14px;overflow-y:auto;max-height:calc(80vh - 50px);}

/* Search */
#search-wrap{display:none;position:absolute;top:14%;left:50%;transform:translateX(-50%);
  width:440px;max-width:92vw;background:#0a0a1e;border:2px solid var(--accent,#00ff88);
  border-radius:4px;z-index:60;pointer-events:all;box-shadow:0 0 40px #00ff8838;}
#search-bar{display:flex;align-items:center;gap:8px;padding:0 14px;
  border-bottom:1px solid #1a1a3e;}
#search-bar span{color:var(--accent,#00ff88);font-size:14px;padding:10px 0;}
#search-inp{flex:1;background:none;border:none;outline:none;color:#c0c8ff;
  font-size:11px;font-family:monospace;padding:10px 4px;}
#search-res{max-height:300px;overflow-y:auto;}
.sr{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;
  border-left:2px solid transparent;transition:background .1s;}
.sr:hover,.sr.sel{background:#00ff8812;border-left-color:var(--accent,#00ff88);}
.sr-icon{font-size:13px;width:20px;text-align:center;}
.sr-main{flex:1;}
.sr-name{font-size:9px;font-weight:bold;color:#c0c8ff;}
.sr-desc{font-size:7px;color:#555;margin-top:1px;}
.sr-tag{font-size:7px;color:var(--accent,#00ff88);background:#00ff8815;
  border:1px solid #00ff8830;border-radius:2px;padding:1px 5px;white-space:nowrap;}
#search-footer{padding:5px 14px;border-top:1px solid #1a1a3e;
  color:#333;font-size:7px;display:flex;gap:12px;}
kbd{background:#111;border:1px solid #222;border-radius:1px;padding:0 3px;color:#666;}

/* Bars + misc */
.bar-bg{height:4px;background:#0f0f1a;border-radius:2px;margin:2px 0;}
.bar-fill{height:100%;border-radius:2px;transition:width .6s;}
.row{display:flex;justify-content:space-between;align-items:baseline;
  font-size:8px;margin-bottom:2px;}
.led{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px;flex-shrink:0;}

/* WS status strip */
#ws-strip{position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#ff4444,transparent);
  animation:stripslide 1.5s linear infinite;display:none;}
@keyframes stripslide{0%{background-position:-200px}100%{background-position:200px}}
</style>
</head>
<body>
<div id="app">

  <div id="ui-layer">

const WW = COLS * T, WH = ROWS * T;

// ── Themes ──────────────────────────────────────────────────────

// ── Room definitions ────────────────────────────────────────────
const ROOMS = [

  {id:'replay',     name:'Replay Theater',   tx:26, ty:38, tw:22, th:14, f:0x250025, a:0xff44ff, l:'#ff88ff', m:'replay'},
  {id:'teleport',   name:'Teleport Hub',     tx:54, ty:42, tw:10, th:10, f:0x003030, a:0x00ffff, l:'#00ffff', m:'teleport'},
  {id:'command',    name:'Command Center',   tx:96, ty:38, tw:20, th:14, f:0x002020, a:0x00cccc, l:'#00eeee', m:'command'},
  {id:'portfolio',  name:'Portfolio Vault',  tx:2,  ty:56, tw:18, th:12, f:0x251e00, a:0xddaa00, l:'#ffcc44', m:'portfolio'},
  {id:'emergency',  name:'Emergency Room',   tx:26, ty:56, tw:16, th:12, f:0x500000, a:0xff0000, l:'#ff6666', m:'emergency'},
  {id:'datacenter', name:'Data Center',      tx:62, ty:56, tw:16, th:12, f:0x0f0f18, a:0x6666ff, l:'#8888ff', m:'datacenter'},

// ── NPC definitions ─────────────────────────────────────────────
const NPC_DEFS = [

// ── Mock live data ───────────────────────────────────────────────
const MOCK = {

// ─────────────────────────────────────────────────────────────────
//  MAP GENERATION
// ─────────────────────────────────────────────────────────────────
function buildTileMap() {
  const g = [];
  for (let r = 0; r < ROWS; r++) g.push(new Uint8Array(COLS).fill(1)); // 1=grass
  // Water border
  for (let c = 0; c < COLS; c++) { g[0][c]=g[1][c]=g[ROWS-1][c]=g[ROWS-2][c]=3; }
  for (let r = 0; r < ROWS; r++) { g[r][0]=g[r][1]=g[r][COLS-1]=g[r][COLS-2]=3; }
  // Rooms (floor=5+i, wall=4)
  ROOMS.forEach((rm, i) => {
    for (let dy = 0; dy < rm.th; dy++) for (let dx = 0; dx < rm.tw; dx++) {
      const x=rm.tx+dx, y=rm.ty+dy;
      if (x<COLS&&y<ROWS) g[y][x] = (dy===0||dy===rm.th-1||dx===0||dx===rm.tw-1) ? 4 : (5+i);
    }
    // Door gaps
    const mid = rm.tx + Math.floor(rm.tw/2);
    if (rm.ty+rm.th-1 < ROWS) { g[rm.ty+rm.th-1][mid]=5+i; if(mid+1<COLS)g[rm.ty+rm.th-1][mid+1]=5+i; }
    if (rm.ty > 0) { g[rm.ty][mid]=5+i; if(mid+1<COLS)g[rm.ty][mid+1]=5+i; }
  });
  // Paths between rooms
  const pairs=[[0,1],[1,2],[2,3],[3,4],[5,6],[6,7],[7,11],[8,9],[9,10],[10,11],[12,13],[14,15],[0,5],[5,8],[8,12],[2,6],[6,9],[4,7],[7,11],[11,15],[13,14]];
  pairs.forEach(([a,b])=>{
    const ra=ROOMS[a],rb=ROOMS[b];
    if(!ra||!rb)return;
    const ax=ra.tx+Math.floor(ra.tw/2), ay=ra.ty+Math.floor(ra.th/2);
    const bx=rb.tx+Math.floor(rb.tw/2), by=rb.ty+Math.floor(rb.th/2);
    for(let x=Math.min(ax,bx);x<=Math.max(ax,bx);x++) [ay,ay+1].forEach(y=>{if(y>=0&&y<ROWS&&x>=0&&x<COLS&&g[y][x]===1)g[y][x]=2;});
    for(let y=Math.min(ay,by);y<=Math.max(ay,by);y++) [bx,bx+1].forEach(x=>{if(y>=0&&y<ROWS&&x>=0&&x<COLS&&g[y][x]===1)g[y][x]=2;});
  });
  return g;
}

// ─────────────────────────────────────────────────────────────────
//  TEXTURE GENERATORS (Canvas API)
// ─────────────────────────────────────────────────────────────────
function mkc(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return[c,c.getContext('2d')];}

function makeGrass(){
  const[c,x]=mkc(T,T);
  x.fillStyle='#122012';x.fillRect(0,0,T,T);
  x.fillStyle='#1a3018';x.fillRect(0,0,T,T);
  x.fillStyle='#1a4020';
  for(let i=0;i<5;i++)x.fillRect(1+i*3,Math.floor(Math.random()*12)+1,1,3);
  x.fillStyle='#0a1a0a';x.fillRect(0,T-2,T,2);
  return c;
}
function makePath(){
  const[c,x]=mkc(T,T);
  x.fillStyle='#1e2435';x.fillRect(0,0,T,T);
  x.fillStyle='#252d42';x.fillRect(1,1,T-2,T-2);
  x.fillStyle='#1a1e28';x.fillRect(0,7,T,1);x.fillRect(7,0,1,T);
  x.fillStyle='#3a4060';x.fillRect(2,2,2,2);x.fillRect(T-4,T-4,2,2);
  x.fillStyle='#2e364e';x.fillRect(T-4,2,2,2);x.fillRect(2,T-4,2,2);
  return c;
}
function makeWater(f){
  const[c,x]=mkc(T,T);
  const p=(f/8)*Math.PI*2;
  x.fillStyle='#04091a';x.fillRect(0,0,T,T);
  x.fillStyle='#071228';x.fillRect(1,1,T-2,T-2);
  x.fillStyle='rgba(80,160,255,0.25)';
  for(let y=2;y<T-2;y+=3){const o=Math.floor(Math.sin((y+p*T)*0.7)*1.5);x.fillRect(1+o,y,T-4,1);}
  x.fillStyle=`rgba(120,200,255,${0.12+0.06*Math.sin(p)})`;
  x.fillRect(3,4,2,1);x.fillRect(T-5,T-5,2,1);
  return c;
}
function makeWall(){
  const[c,x]=mkc(T,T);
  x.fillStyle='#0c0814';x.fillRect(0,0,T,T);
  x.fillStyle='#160f22';x.fillRect(0,0,T,T-2);
  x.fillStyle='#1e1530';x.fillRect(1,1,T-2,2);
  x.fillStyle='#080810';x.fillRect(0,7,T,1);x.fillRect(4,0,1,7);
  x.fillStyle='#22183a';x.fillRect(2,2,2,2);
  return c;
}
function makeFloor(hexNum,accentNum){
  const r=(hexNum>>16)&0xff,g=(hexNum>>8)&0xff,b=hexNum&0xff;
  const ar=(accentNum>>16)&0xff,ag=(accentNum>>8)&0xff,ab=accentNum&0xff;
  const[c,x]=mkc(T,T);
  x.fillStyle=`rgb(${r},${g},${b})`;x.fillRect(0,0,T,T);
  x.fillStyle=`rgb(${ar},${ag},${ab})`;x.globalAlpha=0.12;
  x.fillRect(0,0,T,1);x.fillRect(0,0,1,T);x.fillRect(T-1,0,1,T);x.fillRect(0,T-1,T,1);
  x.globalAlpha=0.04;x.fillRect(0,0,T,T);
  x.globalAlpha=1;
  return c;
}
function makeChar(br,bg,bb,hr,hg,hb){
  const[c,ctx]=mkc(T*4,T*4);
  const dirs=[0,1,2,3];
  dirs.forEach(dir=>{
    for(let f=0;f<4;f++){
      const ox=f*T,oy=dir*T,walk=f%2;
      ctx.fillStyle=`rgba(0,0,0,0.3)`;ctx.fillRect(ox+4,oy+T-3,8,2);
      // Legs
      ctx.fillStyle=`rgb(${br},${bg},${bb})`;
      ctx.fillRect(ox+5+(walk?1:-1),oy+T-7,2,4);
      ctx.fillRect(ox+9+(walk?-1:1),oy+T-7,2,4);
      // Body
      ctx.fillRect(ox+4,oy+T-13,8,6);
      // Accent stripe
      ctx.fillStyle=`rgba(255,255,255,0.15)`;ctx.fillRect(ox+4,oy+T-12,8,1);
      // Head
      ctx.fillStyle=`rgb(${hr},${hg},${hb})`;ctx.fillRect(ox+5,oy+T-19,6,6);
      // Eyes
      ctx.fillStyle='#000';
      if(dir===0){ctx.fillRect(ox+6,oy+T-17,1,1);ctx.fillRect(ox+9,oy+T-17,1,1);}
      else if(dir===2){ctx.fillRect(ox+6,oy+T-17,1,1);}
      else if(dir===3){ctx.fillRect(ox+9,oy+T-17,1,1);}
      // Hair/cap on back
      if(dir===1){ctx.fillStyle=`rgb(${br},${bg},${bb})`;ctx.fillRect(ox+5,oy+T-19,6,2);}
    }
  });
  return c;
}

// ─────────────────────────────────────────────────────────────────
//  PHASER SCENE
// ─────────────────────────────────────────────────────────────────
class WorldScene extends Phaser.Scene {
  constructor(){super({key:'WorldScene'});}

  preload(){
    worldTiles = buildTileMap();
    const tm = this.textures;
    tm.addCanvas('t_grass',makeGrass());
    tm.addCanvas('t_path',makePath());
    tm.addCanvas('t_wall',makeWall());
    for(let i=0;i<8;i++) tm.addCanvas(`t_w${i}`,makeWater(i));
    ROOMS.forEach((rm,i)=>tm.addCanvas(`t_f${i}`,makeFloor(rm.f,rm.a)));
    tm.addCanvas('t_player',makeChar(26,58,138,244,200,122));
    NPC_DEFS.forEach(n=>tm.addCanvas(`t_${n.id}`,makeChar(n.body[0],n.body[1],n.body[2],n.head[0],n.head[1],n.head[2])));
  }

  create(){
    SCENE = this;
    this._buildBackground();
    this._buildEnv();
    this._buildLabels();
    this._spawnPlayer();
    this._spawnNPCs();
    this._setupInput();
    this._buildCamera();
    buildMinimapBase();
    startMockData();
  }

  _buildBackground(){
    const rt = this.add.renderTexture(0,0,WW,WH).setDepth(0);
    const tmp = this.add.image(0,0,'t_grass').setVisible(false);
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const t=worldTiles[r][c];
        if(t===3)continue;
        let k='t_grass';
        if(t===1)k='t_grass';
        else if(t===2)k='t_path';
        else if(t===4)k='t_wall';
        else if(t>=5)k=`t_f${t-5}`;
        tmp.setTexture(k).setPosition(c*T+T/2,r*T+T/2).setVisible(true);
        rt.draw(tmp,c*T,r*T);
        tmp.setVisible(false);
      }
    }
    tmp.destroy();
    // Animated water
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      if(worldTiles[r][c]===3){
        const ws=this.add.image(c*T+T/2,r*T+T/2,'t_w0').setDepth(1);
        waterImgs.push(ws);
      }
    }
  }

  _buildEnv(){
    // Decorative trees
    [[15,17],[32,35],[58,18],[88,35],[15,50],[55,16],[88,50],[38,52],[75,53]].forEach(([tx,ty])=>{
      const x=tx*T,y=ty*T,g=this.add.graphics().setDepth(6);
      g.fillStyle(0x3a2010);g.fillRect(x+6,y+12,4,8);
      g.fillStyle(0x0a2a0a);g.fillRect(x+2,y+8,12,6);
      g.fillStyle(0x0f3a0f);g.fillRect(x+0,y+4,16,6);
      g.fillStyle(0x124a12);g.fillRect(x+4,y+0,8,6);
      g.fillStyle(0x1a6020);g.fillRect(x+6,y+1,3,3);
    });
    // Street lamps
    [[20,17],[50,17],[74,17],[20,36],[74,36],[20,54],[82,54],[50,53]].forEach(([tx,ty])=>{
      const x=tx*T,y=ty*T,g=this.add.graphics().setDepth(7);
      g.fillStyle(0x404050);g.fillRect(x+3,y+2,2,16);
      g.fillStyle(0x303040);g.fillRect(x+1,y+16,6,2);
      g.fillStyle(0x707080);g.fillRect(x+0,y,8,4);
      g.fillStyle(0xffee80);g.fillRect(x+2,y+1,4,2);
      this.add.arc(x+4,y+3,T*2.2,0,360,false,0xffee88,0.05).setDepth(3);
    });
    // Computers in rooms
    ROOMS.forEach(rm=>{
      if(rm.id==='plaza'||rm.id==='teleport')return;
      for(let i=0;i<2;i++){
        const cx=(rm.tx+2+i*4)*T,cy=(rm.ty+2)*T,g=this.add.graphics().setDepth(8);
        const a=(rm.a>>16)&0xff,b=(rm.a>>8)&0xff,c2=rm.a&0xff;
        g.fillStyle(0x101018);g.fillRect(cx,cy,16,12);
        g.fillStyle(0x0a0a20);g.fillRect(cx+1,cy+1,14,9);
        g.fillStyle(rm.a,0.5);g.fillRect(cx+2,cy+2,10,1);g.fillRect(cx+2,cy+4,8,1);g.fillRect(cx+2,cy+6,11,1);
        g.fillStyle(rm.a,0.8);g.fillRect(cx+14,cy+2,2,2);
      }
    });
    // Fountain at plaza
    const pr=ROOMS.find(r=>r.id==='plaza');
    if(pr){
      const fx=(pr.tx+Math.floor(pr.tw/2))*T,fy=(pr.ty+2)*T;
      this.fountainGfx=this.add.graphics().setDepth(7);
      this._drawFountain(0);
    }
    // Server racks
    const sr=ROOMS.find(r=>r.id==='server');
    if(sr){
      for(let i=0;i<4;i++){
        const sx=(sr.tx+2+i*4)*T,sy=(sr.ty+2)*T,g=this.add.graphics().setDepth(8);
        g.fillStyle(0x101018);g.fillRect(sx,sy,12,22);
        for(let u=0;u<3;u++){
          g.fillStyle(u%2?0x181828:0x1a1a30);g.fillRect(sx+1,sy+1+u*7,10,6);
          const lc=Math.random()>0.3?0x00ff44:0xff4444;
          g.fillStyle(lc);g.fillRect(sx+9,sy+2+u*7,2,2);
        }
      }
    }
    // Server room alert flash object
    if(sr){
      this.serverFlash=this.add.rectangle(sr.tx*T,sr.ty*T,sr.tw*T,sr.th*T,0xff0000,0).setOrigin(0,0).setDepth(49);
    }
    // Global ambient overlay
    this.alertOverlay=this.add.rectangle(0,0,WW,WH,0xff0000,0).setOrigin(0,0).setDepth(52);
  }

  _drawFountain(frame){
    const pr=ROOMS.find(r=>r.id==='plaza');
    if(!pr||!this.fountainGfx)return;
    const fx=(pr.tx+Math.floor(pr.tw/2))*T,fy=(pr.ty+2)*T;
    this.fountainGfx.clear();
    this.fountainGfx.fillStyle(0x061228);this.fountainGfx.fillRect(fx,fy+16,24,8);
    this.fountainGfx.fillStyle(0x0a1840);this.fountainGfx.fillRect(fx+1,fy+17,22,6);
    this.fountainGfx.fillStyle(0x303048);this.fountainGfx.fillRect(fx,fy+15,24,2);
    this.fountainGfx.fillStyle(0x252535);this.fountainGfx.fillRect(fx+10,fy+8,4,8);
    const p=(frame/8)*Math.PI*2;
    this.fountainGfx.fillStyle(0x64b4ff,0.5);
    for(let a=0;a<4;a++){const ang=a/4*Math.PI*2+p;const wx=fx+12+Math.cos(ang)*5,wy=fy+10+Math.sin(ang)*2;this.fountainGfx.fillRect(wx,wy,2,2);}
    this.fountainGfx.fillStyle(0x96c8ff,0.3);
    for(let a=0;a<4;a++){const ang=a/4*Math.PI*2+p+0.3;const wx=fx+12+Math.cos(ang)*7,wy=fy+13+Math.sin(ang)*2;this.fountainGfx.fillRect(wx,wy,1,1);}
  }

  _buildLabels(){
    ROOMS.forEach(rm=>{
      this.add.text((rm.tx+rm.tw/2)*T,(rm.ty+1.5)*T,rm.name.toUpperCase(),
        {fontSize:'5px',color:rm.l,fontFamily:'monospace',fontStyle:'bold',stroke:'#000000',strokeThickness:2})
        .setOrigin(0.5,0).setDepth(15);
    });
  }

  _spawnPlayer(){
    this.pShadow=this.add.ellipse(playerX,playerY+6,10,4,0x000000,0.35).setDepth(1);
    this.pGlow=this.add.arc(playerX,playerY,T*1.5,0,360,false,0x00ff88,0.05).setDepth(2);
    this.pSprite=this.add.image(playerX,playerY-4,'t_player').setDepth(10);
    this.pSprite.setCrop(0,0,T,T);
    this.pLabel=this.add.text(playerX,playerY-T-6,'YOU',
      {fontSize:'6px',color:'#00ff88',fontFamily:'monospace',backgroundColor:'#000000bb',padding:{x:2,y:1}})
      .setOrigin(0.5,1).setDepth(20);
  }

  _spawnNPCs(){
    NPC_DEFS.forEach(nd=>{
      const wx=nd.stx*T+T/2, wy=nd.sty*T+T/2;
      const n={
        def:nd, wx, wy, facing:0, walkFrame:0, walkTimer:0,
        state:'idle', stateTimer:1000+Math.random()*3000,
        targetX:wx, targetY:wy, bouncePhase:Math.random()*Math.PI*2,
        shadow:this.add.ellipse(wx,wy+5,8,3,0x000000,0.25).setDepth(1),
        sprite:this.add.image(wx,wy-3,`t_${nd.id}`).setDepth(9),
        nameTag:this.add.text(wx,wy-T-7,nd.name,
          {fontSize:'6px',color:'#c0c8ff',fontFamily:'monospace',backgroundColor:'#000000bb',padding:{x:2,y:1}})
          .setOrigin(0.5,1).setDepth(20),
        moodDot:this.add.arc(wx+6,wy-T+1,2.5,0,360,false,0xaaaaff,0.9).setDepth(21),
        iconTxt:this.add.text(wx,wy-T-16,nd.icon,{fontSize:'10px'}).setOrigin(0.5,1).setDepth(22),
        prompt:this.add.text(wx,wy-T*2-4,'[ E ] Talk',
          {fontSize:'7px',color:'#00ff88',fontFamily:'monospace',backgroundColor:'#000000cc',padding:{x:4,y:2}})
          .setOrigin(0.5,1).setDepth(30).setVisible(false),
      };
      n.sprite.setCrop(0,0,T,T);
      npcList.push(n);
    });
  }

  _setupInput(){
    const kb=this.input.keyboard;
    this.cursors=kb.createCursorKeys();
    this.wasd={w:kb.addKey(Phaser.Input.Keyboard.KeyCodes.W),s:kb.addKey(Phaser.Input.Keyboard.KeyCodes.S),a:kb.addKey(Phaser.Input.Keyboard.KeyCodes.A),d:kb.addKey(Phaser.Input.Keyboard.KeyCodes.D)};
    this.eKey=kb.addKey(Phaser.Input.Keyboard.KeyCodes.E);
    this.input.on('wheel',(_,__,___,dy)=>{tgtZoom=Phaser.Math.Clamp(tgtZoom+(dy>0?-0.15:0.15),0.5,3.5);});
    this.input.on('pointerup',ptr=>{
      if(ptr.button!==0)return;
      const cam=this.cameras.main;
      const wx=ptr.x+cam.scrollX,wy=ptr.y+cam.scrollY;
      const tx=Math.floor(wx/T),ty=Math.floor(wy/T);
      if(isWalkable(tx,ty))clickTarget={x:tx*T+T/2,y:ty*T+T/2};
    });
  }

  _buildCamera(){
    const cam=this.cameras.main;
    cam.setBounds(0,0,WW,WH);
    cam.setZoom(curZoom);
    cam.centerOn(playerX,playerY);
    cam.setRoundPixels(true);
    cam.setBackgroundColor(CUR_THEME.bg);
  }

  update(time,delta){
    const dt=delta/1000,spd=90*dt;
    let dx=0,dy=0;

    // Keyboard
    const{up,down,left,right}=this.cursors,{w,s,a,d}=this.wasd;
    if(up.isDown||w.isDown)   {dy=-spd;this.pFacing=1;clickTarget=null;}
    if(down.isDown||s.isDown) {dy=+spd;this.pFacing=0;clickTarget=null;}
    if(left.isDown||a.isDown) {dx=-spd;this.pFacing=2;clickTarget=null;}
    if(right.isDown||d.isDown){dx=+spd;this.pFacing=3;clickTarget=null;}
    if(this.pFacing===undefined)this.pFacing=0;

    // Diagonal normalize
    if(dx&&dy){const n=1/Math.SQRT2;dx*=n;dy*=n;}

    // Click-to-move
    if(clickTarget&&dx===0&&dy===0){
      const cx=clickTarget.x-playerX,cy=clickTarget.y-playerY;
      const dist=Math.sqrt(cx*cx+cy*cy);
      if(dist<3){clickTarget=null;}else{
        const mv=Math.min(spd,dist),nx=cx/dist,ny=cy/dist;
        dx=nx*mv;dy=ny*mv;
        this.pFacing=Math.abs(nx)>Math.abs(ny)?(nx>0?3:2):(ny>0?0:1);
      }
    }

    // Collision
    if(dx&&isWalkable(Math.floor((playerX+dx)/T),Math.floor(playerY/T)))playerX+=dx;
    if(dy&&isWalkable(Math.floor(playerX/T),Math.floor((playerY+dy)/T)))playerY+=dy;

    // Walk anim
    isMoving=dx!==0||dy!==0;
    if(isMoving){walkTimer+=delta;if(walkTimer>120){walkTimer=0;walkFrame=(walkFrame+1)%4;}}
    else walkFrame=0;
    this.pSprite.setCrop(walkFrame*T,this.pFacing*T,T,T);

    // Sync player visuals
    this.pSprite.setPosition(playerX,playerY-4);
    this.pShadow.setPosition(playerX,playerY+5);
    this.pGlow.setPosition(playerX,playerY);
    this.pLabel.setPosition(playerX,playerY-T-6);

    // Camera
    const zd=tgtZoom-curZoom;
    if(Math.abs(zd)>0.001){curZoom+=zd*0.1;this.cameras.main.setZoom(curZoom);}
    const cam=this.cameras.main;
    const cx=cam.scrollX+cam.width/2/curZoom;
    const cy=cam.scrollY+cam.height/2/curZoom;
    cam.scrollX+=(playerX-cx)*0.09;
    cam.scrollY+=(playerY-cy)*0.09;

    // Water + fountain animation (every 250ms)
    animTick+=delta;
    if(animTick>=250){
      animTick=0;
      this._wf=(((this._wf||0)+1)%8);
      waterImgs.forEach(w2=>w2.setTexture(`t_w${this._wf}`));
      this._ff=(((this._ff||0)+1)%8);
      this._drawFountain(this._ff);
    }

    // NPCs
    this._updateNPCs(delta);

    // Interaction
    this._checkInteraction();

    // Room detection
    const tx2=Math.floor(playerX/T),ty2=Math.floor(playerY/T);
    const rm=getRoomAt(tx2,ty2);
    if(rm?.id!==currentRoom){
      currentRoom=rm?.id??null;
      if(rm){showRoomLabel(rm.name);playBeep(660,0.05);}
    }

    // Alert effects
    const severity=getSeverity();
    if(severity==='critical'){
      this._alertTick=(this._alertTick||0)+delta;
      if(this._alertTick>700){this._alertTick=0;this._alertOn=!this._alertOn;}
      const a2=this._alertOn?0.06:0;
      this.alertOverlay.setAlpha(a2);
      if(this.serverFlash)this.serverFlash.setAlpha(this._alertOn?0.35:0);
    } else {
      this.alertOverlay.setAlpha(severity==='warn'?0.02:0);
      if(this.serverFlash)this.serverFlash.setAlpha(0);
    }

    // HUD
    document.getElementById('coord').textContent=`${tx2},${ty2}`;
    updateHUD();
    if(roomLblTimer>0){roomLblTimer-=delta;if(roomLblTimer<=500)document.getElementById('room-lbl').style.opacity=String(roomLblTimer/500);if(roomLblTimer<=0)document.getElementById('room-lbl').style.opacity='0';}
    updateMinimap();
  }

  _updateNPCs(delta){
    npcList.forEach(n=>{
      n.bouncePhase+=delta/1000*1.8;
      n.stateTimer-=delta;
      const rm=ROOMS.find(r=>r.id===n.def.room);
      if(!rm)return;
      if(n.state==='idle'){
        if(n.stateTimer<=0){
          const dirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
          const d=dirs[Math.floor(Math.random()*4)];
          const steps=1+Math.floor(Math.random()*3);
          const ctxT=Math.floor(n.wx/T),ctyT=Math.floor(n.wy/T);
          const ntx=Phaser.Math.Clamp(ctxT+d.dx*steps,rm.tx+1,rm.tx+rm.tw-2);
          const nty=Phaser.Math.Clamp(ctyT+d.dy*steps,rm.ty+1,rm.ty+rm.th-2);
          n.targetX=ntx*T+T/2;n.targetY=nty*T+T/2;
          const ddx=n.targetX-n.wx,ddy=n.targetY-n.wy;
          n.facing=Math.abs(ddx)>Math.abs(ddy)?(ddx>0?3:2):(ddy>0?0:1);
          n.state='walking';n.stateTimer=800+Math.random()*1800;
        }
      } else {
        const ddx=n.targetX-n.wx,ddy=n.targetY-n.wy;
        const dist=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dist<2||n.stateTimer<=0){
          n.wx=n.targetX;n.wy=n.targetY;n.state='idle';n.stateTimer=1500+Math.random()*3000;
        } else {
          const spd2=Math.min(26*delta/1000,dist);
          n.wx+=ddx/dist*spd2;n.wy+=ddy/dist*spd2;
          n.walkTimer=(n.walkTimer||0)+delta;
          if(n.walkTimer>150){n.walkTimer=0;n.walkFrame=(n.walkFrame+1)%4;}
        }
      }
      const bob=n.state==='idle'?Math.sin(n.bouncePhase)*0.7:0;
      const wf=n.state==='walking'?n.walkFrame%4:0;
      n.sprite.setCrop(wf*T,n.facing*T,T,T);
      n.sprite.setPosition(n.wx,n.wy-3+bob);
      n.shadow.setPosition(n.wx,n.wy+5);
      n.nameTag.setPosition(n.wx,n.wy-T-6);
      n.moodDot.setPosition(n.wx+6,n.wy-T+1);
      n.iconTxt.setPosition(n.wx,n.wy-T-14);
      n.prompt.setPosition(n.wx,n.wy-T*2-4);
      // Proximity
      const dx=playerX-n.wx,dy=playerY-n.wy;
      n.prompt.setVisible(dx*dx+dy*dy<(T*2.5)*(T*2.5));
      // Mood
      const ag=MOCK.agents[n.def.id];
      let mc=0xaaaaff;
      if(!MOCK.connected)mc=0xff4444;
      else if(ag){if(ag.conf>0.75)mc=0x00ff88;else if(ag.conf<0.45)mc=0xff8800;else mc=0xaaaaff;}
      n.moodDot.setFillStyle(mc,0.9);
    });
  }

  _checkInteraction(){
    const eDown=this.eKey.isDown;
    if(eDown&&!eWasDown){
      let nearest=null,nd2=Infinity;
      npcList.forEach(n=>{const dx=playerX-n.wx,dy=playerY-n.wy,d=dx*dx+dy*dy;if(d<(T*2.5)**2&&d<nd2){nd2=d;nearest=n;}});
      if(nearest){
        const rm=ROOMS.find(r=>r.id===nearest.def.room);
        if(rm)openModal(rm,nearest.def);
      } else if(currentRoom){
        const rm=ROOMS.find(r=>r.id===currentRoom);
        if(rm)openModal(rm,null);
      }
    }
    eWasDown=eDown;
  }

function isWalkable(tx,ty){
  if(tx<0||tx>=COLS||ty<0||ty>=ROWS)return false;
  const t=worldTiles[ty]?.[tx]??0;
  return t===2||t>=5;
}
function getRoomAt(tx,ty){
  return ROOMS.find(r=>tx>=r.tx&&tx<r.tx+r.tw&&ty>=r.ty&&ty<r.ty+r.th)||null;
}

function hex6(n){return('#'+n.toString(16).padStart(6,'0'));}

// ─────────────────────────────────────────────────────────────────
const MM_W=180,MM_H=108,MW=MM_W/COLS,MH=MM_H/ROWS;
const TILE_C={1:'#122012',2:'#1e2435',3:'#040918',4:'#080810'};

function buildMinimapBase(){
  const c=document.createElement('canvas');c.width=MM_W;c.height=MM_H;
  const ctx=c.getContext('2d');
  for(let r=0;r<ROWS;r++) for(let cc=0;cc<COLS;cc++){
    const t=worldTiles[r][cc];
    if(t>=5){const rm=ROOMS[t-5];ctx.fillStyle=hex6(rm?.f??0x111111);}
    else ctx.fillStyle=TILE_C[t]||'#060606';
    ctx.fillRect(cc*MW,r*MH,Math.ceil(MW)+1,Math.ceil(MH)+1);
  }
  ROOMS.forEach((rm,i)=>{
    ctx.strokeStyle=hex6(rm.a)+'88';ctx.lineWidth=0.6;
    ctx.strokeRect(rm.tx*MW,rm.ty*MH,rm.tw*MW,rm.th*MH);
    ctx.fillStyle=hex6(rm.a)+'99';ctx.font='3px monospace';ctx.textAlign='center';
    ctx.fillText(rm.name.slice(0,6).toUpperCase(),(rm.tx+rm.tw/2)*MW,(rm.ty+rm.th/2)*MH+1);
  });
  mmBase=c;
}

function updateMinimap(){
  const canvas=document.getElementById('minimap');
  const ctx=canvas.getContext('2d');
  if(mmBase)ctx.drawImage(mmBase,0,0);
  // NPCs
  npcList.forEach(n=>{
    ctx.fillStyle='#ffee00';ctx.beginPath();
    ctx.arc(n.wx/T*MW,n.wy/T*MH,1.8,0,Math.PI*2);ctx.fill();
  });
  // Player triangle
  const px2=playerX/T*MW,py2=playerY/T*MH;
  ctx.fillStyle='#ffffff';
  ctx.beginPath();ctx.moveTo(px2,py2-3.5);ctx.lineTo(px2-2,py2+1.5);ctx.lineTo(px2+2,py2+1.5);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath();ctx.arc(px2,py2,4.5,0,Math.PI*2);ctx.fill();
}

document.getElementById('minimap').addEventListener('click',e=>{
  const rect=e.target.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const tx=Math.floor(mx/MW),ty=Math.floor(my/MH);
  let best=ROOMS[0],bd=Infinity;
  ROOMS.forEach(r=>{const d=Math.hypot(r.tx+r.tw/2-tx,r.ty+r.th/2-ty);if(d<bd){bd=d;best=r;}});
  teleportToRoom(best.id);
});

function toggleAudio(){
  audioOn=!audioOn;
  const btn=document.getElementById('t-audio');
  btn.textContent=audioOn?'♪ ON':'♪ OFF';
  btn.classList.toggle('on',audioOn);
  if(audioOn&&!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();masterGain.gain.value=0.12;
    masterGain.connect(audioCtx.destination);
    // Server hum
    [60,120,180].forEach(f=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=f;g.gain.value=0.02;
      o.connect(g);g.connect(masterGain);o.start();
    });
  }
  if(masterGain)masterGain.gain.setTargetAtTime(audioOn?0.12:0,audioCtx.currentTime,0.5);
}
function playBeep(freq=880,dur=0.06,vol=0.06){
  if(!audioOn||!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='square';o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}

    document.getElementById('ws-strip').style.display='none';
    addFeedEvent('CONNECTED TO BRAIN BOT V15','success');
    addFeedEvent('INITIAL SYNC COMPLETE','info');
  },800);

  // Random events every 2.5s
  setInterval(()=>{
    const e=FEED_EVENTS[Math.floor(Math.random()*FEED_EVENTS.length)];
    addFeedEvent(e.ev,e.lv);
    MOCK.decision.conf=Math.max(0.2,Math.min(0.95,MOCK.decision.conf+(-0.04+Math.random()*0.08)));
  },2500);

  // Position panel
  const po=MOCK.paper.pos;
  const uc=po.upnl>=0?'#00ff88':'#ff4444';
  document.getElementById('pos-content').innerHTML=`
    <div class="row"><span style="color:${po.side==='LONG'?'#00ff88':'#ff4444'};font-size:11px;font-weight:bold;">${po.side}</span><span>${po.size} BTC</span></div>
    <div class="row"><span style="color:#555;">Entry</span><span>${po.entry.toLocaleString()}</span></div>
    <div class="row"><span style="color:#555;">uPnL</span><span style="color:${uc};font-weight:bold;">${po.upnl>=0?'+':''}${po.upnl.toFixed(2)} USDT</span></div>`;

  // Score bars
  const sb=document.getElementById('score-bars');
  Object.entries(MOCK.decision.scores).forEach(([k,v])=>{
    const d=document.createElement('div');d.style.marginBottom='3px';
    d.innerHTML=`<div class="row"><span style="color:#555;font-size:7px;">${k}</span><span style="color:#00ff88;font-size:7px;">${Math.round(v*100)}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${v*100}%;background:#00ff88;"></div></div>`;
    sb.appendChild(d);
  });

  // Health grid
  const hg=document.getElementById('health-grid');
  Object.entries(MOCK.agents).forEach(([k,v])=>{
    const c2=v.status==='ALIVE'?'#00ff88':v.status==='STALE'?'#ffaa00':'#ff4444';
    const d=document.createElement('div');
    d.style.cssText='display:flex;align-items:center;gap:3px;font-size:7px;';
    d.innerHTML=`<div class="led" style="background:${c2};"></div><span style="color:#666;">${k}</span>`;
    hg.appendChild(d);
  });
}

// ─────────────────────────────────────────────────────────────────
//  LAUNCH PHASER
// ─────────────────────────────────────────────────────────────────
window.onload=()=>{
  document.documentElement.style.setProperty('--accent','#00ff88');
  PH=new Phaser.Game({
    type:Phaser.AUTO,
    parent:'game-container',
    width:'100%',height:'100%',
    backgroundColor:'#070714',
    pixelArt:true,antialias:false,roundPixels:true,
    scene:[WorldScene],
    physics:{default:'arcade',arcade:{gravity:{x:0,y:0},debug:false}},
    scale:{mode:Phaser.Scale.RESIZE,autoCenter:Phaser.Scale.CENTER_BOTH},
  });
};
</script>
