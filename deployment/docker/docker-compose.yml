version: "3.9"

# ══════════════════════════════════════════════════════
#  Brain Bot V13 — Production Docker Compose
#  Usage:
#    docker compose up -d
#    docker compose logs -f brain_bot
# ══════════════════════════════════════════════════════

services:

  # ── Bot + Dashboard API ──────────────────────────────
  brain_bot:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile
    container_name: brain_bot_v13
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - EXECUTION_MODE=${EXECUTION_MODE:-paper}
      - PYTHONUNBUFFERED=1
    volumes:
      - ../brain_bot_v13.db:/app/brain_bot_v13.db
      - ../brain_bot_journal.db:/app/brain_bot_journal.db
      - ../logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - brainbot_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy

  # ── Redis (event cache / rate limit) ────────────────
  redis:
    image: redis:7-alpine
    container_name: brain_bot_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - brainbot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Nginx reverse proxy + SSL ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: brain_bot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - brainbot_net
    depends_on:
      - brain_bot

volumes:
  redis_data:
  nginx_logs:

networks:
  brainbot_net:
    driver: bridge
